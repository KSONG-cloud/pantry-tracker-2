name: React Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Tell GitHub to run all commands inside the client folder!
    defaults:
      run:
        working-directory: ./client

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x' 

    - name: Install dependencies
      run: npm ci

    - name: Build React App
      run: npm run build