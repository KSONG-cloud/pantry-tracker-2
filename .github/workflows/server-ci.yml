name: Node.js CI

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # This tells GitHub to run the job on the latest version of Ubuntu
    runs-on: ubuntu-latest

    # Tell GitHub to run all commands inside the server folder!
    defaults:
      run:
        working-directory: ./server

    steps:
    # Grab code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # Install dependencies
    - name: Install dependencies
      run: npm ci

    # Run build script
    - name: Build project
      run: npm run build

